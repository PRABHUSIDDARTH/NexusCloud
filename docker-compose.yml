services:
  postgres:
    image: postgres:16-alpine
    container_name: nexuscloud_db
    environment:
      POSTGRES_USER: your_userID
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: nexuscloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexuscloud_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
